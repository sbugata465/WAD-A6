<html>
<body>

<button onclick="date()">Display Date</button>
<input type="text" id="date">
<button onclick="factorial()">Calculate Factorial</button>

<script>
function date() {
  let today = new Date();
  let day = today.getDate();
  let month = today.getMonth() + 1; 
  let year = today.getFullYear();

  let val = day + "/" + month + "/" + year;
  
  document.getElementById("date").value = val;
}

function factorial(){
  let n=prompt("Enter a number to calculate its factorial:");
  n=Number(n);

  let fact=1;
  for(let i=1;i<=n;i++){
    fact*=i;
  }

  alert("The factorial of "+n+" is "+fact);
}
</script>

</body>
</html>
